services:
  api:
    image: oven/bun:1.3.11
    container_name: error-decoder-api
    restart: unless-stopped
    working_dir: /app
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    env_file: .env
    command: sh -c "bun install && bun run --hot packages/api/src/server.ts"

  stripe:
    image: stripe/stripe-cli:v1.12.0
    container_name: error-decoder-stripe
    restart: unless-stopped
    command: "listen --api-key ${STRIPE_SECRET_KEY} --forward-to error-decoder-api:5000/api/webhook/stripe"
    env_file: .env
    volumes:
      - stripe-data:/stripe

  web:
    image: oven/bun:1
    container_name: error-decoder-web
    restart: unless-stopped
    working_dir: /app
    ports:
      - "4000:4000"
    volumes:
      - .:/app
    env_file: .env
    command: sh -c "bun install && bun run --hot packages/web/src/server.ts"

volumes:
  stripe-data:
