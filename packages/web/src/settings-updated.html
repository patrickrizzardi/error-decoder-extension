<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ErrorDecoder — Settings Updated</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --card-bg: #1e1e1e;
      --text: #e4e4e4;
      --text-muted: #808080;
      --accent: #569cd6;
      --success: #4ec9b0;
      --border: #3e3e3e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 48px 32px;
      width: 100%;
      max-width: 480px;
      text-align: center;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 24px; color: var(--success); margin-bottom: 8px; }
    .subtitle {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .note {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h1>Settings Updated</h1>
    <p class="subtitle">Your subscription changes have been saved.<br>You can close this tab and return to the extension.</p>
    <p class="note">Changes will be reflected in the sidebar automatically.</p>
  </div>

  <script>
    // Refresh the extension's plan data in case subscription changed
    const EXTENSION_ID = "%%EXTENSION_ID%%";
    if (EXTENSION_ID && chrome?.runtime?.sendMessage) {
      try {
        chrome.runtime.sendMessage(EXTENSION_ID, {
          type: "PLAN_CHANGED",
        });
      } catch {
        // Extension not available
      }
    }
  </script>
</body>
</html>
