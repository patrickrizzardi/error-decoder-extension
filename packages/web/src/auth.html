<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ErrorDecoder — Sign In</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --card-bg: #1e1e1e;
      --text: #e4e4e4;
      --text-muted: #808080;
      --accent: #569cd6;
      --accent-hover: #6cb0f0;
      --border: #3e3e3e;
      --error: #f44747;
      --success: #4ec9b0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
    }
    h1 { font-size: 24px; margin-bottom: 4px; }
    .subtitle { color: var(--text-muted); margin-bottom: 24px; font-size: 14px; }
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      cursor: pointer;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      font-size: 14px;
    }
    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    label {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 4px;
      margin-top: 12px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
    }
    input:focus { outline: none; border-color: var(--accent); }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-google {
      background: white;
      color: #333;
      border: 1px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-google:hover { background: #f5f5f5; }
    .divider {
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      margin: 16px 0;
      position: relative;
    }
    .divider::before, .divider::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--border);
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    .message {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }
    .message.error { display: block; background: #2d1515; color: var(--error); }
    .message.success { display: block; background: #152d1f; color: var(--success); }
    .hidden { display: none; }

    /* Success state */
    .success-state {
      text-align: center;
      padding: 20px 0;
    }
    .success-state h2 {
      color: var(--success);
      margin-bottom: 8px;
    }
    .api-key-display {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      margin: 16px 0;
      font-family: monospace;
      font-size: 13px;
      word-break: break-all;
      position: relative;
    }
    .copy-btn {
      width: auto;
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 4px 12px;
      font-size: 12px;
      margin: 0;
      background: var(--border);
      color: var(--text);
    }
    .note {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 12px;
    }
    .btn-logout {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      margin-top: 12px;
    }
    .btn-logout:hover {
      color: var(--error);
      border-color: var(--error);
    }
    /* Checkout loading state */
    .checkout-loading {
      text-align: center;
      padding: 40px 0;
    }
    .checkout-loading h2 {
      color: var(--accent);
      margin-bottom: 12px;
    }
    .checkout-loading p {
      color: var(--text-muted);
      font-size: 14px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      margin: 0 auto 16px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <!-- Auth forms -->
    <div id="auth-forms">
      <h1>ErrorDecoder</h1>
      <p class="subtitle">Sign in to start decoding errors</p>

      <!-- Google OAuth — MVP2, enable after configuring Google Cloud project -->
      <!--
      <button class="btn-google" id="google-btn">
        <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.997 8.997 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
        Continue with Google
      </button>
      <div class="divider">or</div>
      -->

      <div class="tabs">
        <div class="tab active" data-tab="signup">Sign Up</div>
        <div class="tab" data-tab="login">Log In</div>
      </div>

      <form id="signup-form">
        <label for="signup-email">Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com" required>
        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" placeholder="Min 6 characters" minlength="6" required>
        <button type="submit" class="btn-primary">Create Account</button>
      </form>

      <form id="login-form" class="hidden">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" required>
        <label for="login-password">Password</label>
        <input type="password" id="login-password" required>
        <button type="submit" class="btn-primary">Log In</button>
      </form>

      <div id="message" class="message"></div>
    </div>

    <!-- Checkout loading state (no flash, clean redirect) -->
    <div id="checkout-loading" class="checkout-loading hidden">
      <div class="spinner"></div>
      <h2>Setting up checkout</h2>
      <p>Redirecting to Stripe...</p>
    </div>

    <!-- Success state (after auth) -->
    <div id="success-state" class="success-state hidden">
      <h2>You're all set!</h2>
      <p>Your API key for the extension:</p>
      <div class="api-key-display">
        <span id="api-key-text"></span>
        <button class="copy-btn" id="copy-key">Copy</button>
        <button class="copy-btn" id="toggle-key" style="right: 60px;">Show</button>
      </div>
      <p class="note">
        The extension has been updated automatically.
      </p>
      <p class="note" id="fallback-note" style="display:none; margin-top: 8px;">
        Extension not detected? <button class="copy-btn" id="copy-key-fallback" style="position:static; display:inline-block; margin:0; padding: 2px 8px; font-size:11px;">Copy key</button> and paste it in the extension's Settings page.
      </p>
      <button class="btn-logout" id="logout-btn">Log Out</button>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "%%SUPABASE_URL%%";
    const SUPABASE_KEY = "%%SUPABASE_PUBLISHABLE_KEY%%";
    const API_BASE = "%%API_BASE%%";
    const EXTENSION_ID = "%%EXTENSION_ID%%";

    const urlParams = new URLSearchParams(window.location.search);

    // Nuke all Supabase tokens from localStorage
    const clearSupabaseStorage = () => {
      Object.keys(localStorage).forEach((key) => {
        if (key.startsWith("sb-")) localStorage.removeItem(key);
      });
    };

    // Handle logout BEFORE creating the client — avoids autoRefreshToken race condition
    if (urlParams.get("logout") === "true") {
      // Clear tokens first so the client can't auto-refresh them
      clearSupabaseStorage();
      // Create a throwaway client with no auto-refresh just to call signOut
      const logoutClient = createClient(SUPABASE_URL, SUPABASE_KEY, {
        auth: { autoRefreshToken: false, persistSession: false },
      });
      await logoutClient.auth.signOut({ scope: "global" });
      // Belt and suspenders — clear again in case signOut wrote something
      clearSupabaseStorage();
      window.location.replace("/auth");
      // Stop execution — don't initialize anything else
      throw new Error("logout-redirect");
    }

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const messageEl = document.getElementById("message");
    const showMessage = (text, type = "error") => {
      messageEl.textContent = text;
      messageEl.className = `message ${type}`;
    };

    // Tab switching
    document.querySelectorAll(".tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
        tab.classList.add("active");
        const isSignup = tab.dataset.tab === "signup";
        document.getElementById("signup-form").classList.toggle("hidden", !isSignup);
        document.getElementById("login-form").classList.toggle("hidden", isSignup);
        messageEl.className = "message";
      });
    });

    const checkoutInterval = urlParams.get("checkout");

    // Show only one state at a time
    const showState = (stateId) => {
      ["auth-forms", "success-state", "checkout-loading"].forEach((id) => {
        document.getElementById(id).classList.toggle("hidden", id !== stateId);
      });
    };

    // After successful auth — get API key, send to extension, and handle checkout redirect
    const onAuthSuccess = async (session) => {
      // If checkout intent, show clean loading immediately (no API key flash)
      if (checkoutInterval === "month" || checkoutInterval === "year") {
        showState("checkout-loading");
      }

      try {
        const res = await fetch(`${API_BASE}/api/auth/key`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${session.access_token}`,
          },
        });
        const json = await res.json();

        if (json.data?.apiKey) {
          // Try to send to extension
          if (EXTENSION_ID && chrome?.runtime?.sendMessage) {
            try {
              chrome.runtime.sendMessage(EXTENSION_ID, {
                type: "AUTH_SUCCESS",
                apiKey: json.data.apiKey,
                email: json.data.email,
                plan: json.data.plan,
              });
            } catch {
              // Extension not available — user can copy key manually
            }
          }

          // If checkout intent, redirect straight to Stripe
          if (checkoutInterval === "month" || checkoutInterval === "year") {
            const checkoutRes = await fetch(`${API_BASE}/api/checkout`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${json.data.apiKey}`,
              },
              body: JSON.stringify({ interval: checkoutInterval }),
            });
            const checkoutJson = await checkoutRes.json();

            if (checkoutJson.data?.url) {
              window.location.href = checkoutJson.data.url;
              return;
            }
            // Checkout failed — fall through to show API key
          }

          // No checkout intent (or checkout failed) — show API key
          showState("success-state");
          const apiKeyEl = document.getElementById("api-key-text");
          apiKeyEl.textContent = json.data.apiKey.slice(0, 8) + "••••••••";
          apiKeyEl.dataset.fullKey = json.data.apiKey;
          apiKeyEl.dataset.revealed = "false";
          setTimeout(() => {
            const fallback = document.getElementById("fallback-note");
            if (fallback) fallback.style.display = "block";
          }, 3000);
        }
      } catch {
        showState("auth-forms");
        showMessage("Failed to get API key. Try again.");
      }
    };

    // Logout handler (from the button on the success state)
    const handleLogout = async () => {
      clearSupabaseStorage();
      await supabase.auth.signOut({ scope: "global" });
      clearSupabaseStorage();
      // Also tell the extension to clear its state
      if (EXTENSION_ID && chrome?.runtime?.sendMessage) {
        try {
          chrome.runtime.sendMessage(EXTENSION_ID, { type: "LOGOUT" });
        } catch {
          // Extension not available
        }
      }
      // Reload to show login form
      window.location.replace("/auth");
    };

    document.getElementById("logout-btn")?.addEventListener("click", handleLogout);

    // Google OAuth — MVP2
    // document.getElementById("google-btn").addEventListener("click", async () => {
    //   const { error } = await supabase.auth.signInWithOAuth({
    //     provider: "google",
    //     options: { redirectTo: window.location.href },
    //   });
    //   if (error) showMessage(error.message);
    // });

    // Sign up
    document.getElementById("signup-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("signup-email").value;
      const password = document.getElementById("signup-password").value;

      const { data, error } = await supabase.auth.signUp({ email, password });
      if (error) return showMessage(error.message);

      if (data.session) {
        await onAuthSuccess(data.session);
      } else {
        showMessage("Check your email for a confirmation link.", "success");
      }
    });

    // Log in
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("login-email").value;
      const password = document.getElementById("login-password").value;

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) return showMessage(error.message);
      if (data.session) await onAuthSuccess(data.session);
    });

    // Copy key
    const doCopyKey = async (buttonId) => {
      const key = document.getElementById("api-key-text").dataset.fullKey;
      if (!key) return;
      await navigator.clipboard.writeText(key);
      const btn = document.getElementById(buttonId);
      if (btn) {
        const original = btn.textContent;
        btn.textContent = "Copied!";
        setTimeout(() => { btn.textContent = original; }, 2000);
      }
    };

    document.getElementById("copy-key")?.addEventListener("click", () => doCopyKey("copy-key"));
    document.getElementById("copy-key-fallback")?.addEventListener("click", () => doCopyKey("copy-key-fallback"));

    // Show/hide key toggle
    document.getElementById("toggle-key")?.addEventListener("click", () => {
      const apiKeyEl = document.getElementById("api-key-text");
      const isRevealed = apiKeyEl.dataset.revealed === "true";
      if (isRevealed) {
        apiKeyEl.textContent = apiKeyEl.dataset.fullKey.slice(0, 8) + "••••••••";
        apiKeyEl.dataset.revealed = "false";
        document.getElementById("toggle-key").textContent = "Show";
      } else {
        apiKeyEl.textContent = apiKeyEl.dataset.fullKey;
        apiKeyEl.dataset.revealed = "true";
        document.getElementById("toggle-key").textContent = "Hide";
      }
    });

    // Check for existing session (only runs if NOT logout flow)
    const { data: { session } } = await supabase.auth.getSession();
    if (session) await onAuthSuccess(session);
  </script>
</body>
</html>
