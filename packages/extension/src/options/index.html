<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ErrorDecoder — Settings</title>
  <style>
    :root {
      --bg: #1e1e1e;
      --text: #d4d4d4;
      --text-muted: #808080;
      --accent: #569cd6;
      --border: #3e3e3e;
      --bg-secondary: #2d2d2d;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #ffffff;
        --text: #1e1e1e;
        --text-muted: #6e6e6e;
        --accent: #0066cc;
        --border: #e0e0e0;
        --bg-secondary: #f5f5f5;
      }
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background: var(--bg);
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
    }
    h1 { font-size: 20px; margin-bottom: 24px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
    .field .value {
      padding: 8px 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: monospace;
      font-size: 13px;
    }
    button {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      margin-right: 8px;
    }
    button:hover { border-color: var(--accent); }
    button.danger { color: #f44747; }
    button.danger:hover { border-color: #f44747; }
    .actions { margin-top: 24px; }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <h1>ErrorDecoder Settings</h1>

  <div class="field">
    <label>Email</label>
    <div class="value" id="email">Not signed in</div>
  </div>

  <div class="field">
    <label>Plan</label>
    <div class="value" id="plan">—</div>
  </div>

  <div class="field">
    <label>API Key</label>
    <div class="value" id="api-key">••••••••</div>
    <button id="copy-key" style="margin-top: 6px;">Copy Key</button>
  </div>

  <div class="field" id="manual-key-section">
    <label>Enter API Key Manually</label>
    <div style="display: flex; gap: 6px; margin-top: 4px;">
      <input type="text" id="manual-key-input" placeholder="Paste your API key here"
        style="flex:1; padding: 8px 12px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: monospace; font-size: 13px;">
      <button id="save-key">Save</button>
    </div>
    <div id="save-status" style="font-size: 12px; margin-top: 4px; color: var(--accent);"></div>
  </div>

  <div class="actions">
    <button id="manage-sub" style="display:none;">Manage Subscription</button>
    <button id="logout">Log Out</button>
    <button id="delete-account" class="danger">Delete Account</button>
  </div>

  <p style="margin-top: 24px; font-size: 12px; color: var(--text-muted);">
    <a id="privacy-link" href="#" target="_blank">Privacy Policy</a> ·
    <a id="terms-link" href="#" target="_blank">Terms of Service</a>
  </p>

  <script src="index.ts" type="module"></script>
</body>
</html>
