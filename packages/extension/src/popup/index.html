<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ErrorDecoder</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <h1>ErrorDecoder</h1>

    <!-- Paste mode -->
    <div id="paste-mode">
      <textarea
        id="error-input"
        placeholder="Paste your error message or stack trace here..."
        rows="6"
      ></textarea>
      <div id="char-count">
        <span id="char-current">0</span> / <span id="char-limit">1,000</span>
      </div>
      <button id="decode-btn">Decode</button>
    </div>

    <!-- Loading state -->
    <div id="loading-state" class="hidden">
      <div class="skeleton-block"></div>
      <div class="skeleton-block short"></div>
      <div class="skeleton-block"></div>
    </div>

    <!-- Result state -->
    <div id="result-state" class="hidden">
      <section>
        <h3>What Happened</h3>
        <p id="what-happened-text"></p>
      </section>

      <section>
        <h3>Why This Occurs</h3>
        <ul id="why-list"></ul>
      </section>

      <section>
        <h3>How to Fix</h3>
        <ol id="fix-list"></ol>
      </section>

      <section id="code-example" class="hidden">
        <h3>Code Example</h3>
        <div class="code-block">
          <pre><code id="code-after-text"></code></pre>
          <button id="copy-code" class="copy-btn">Copy</button>
        </div>
      </section>

      <button id="new-decode-btn" class="secondary-btn">Decode Another</button>
    </div>

    <!-- Error state -->
    <div id="error-state" class="hidden">
      <p id="error-message" class="error-text"></p>
      <button id="retry-btn" class="secondary-btn">Try Again</button>
    </div>

    <!-- Links -->
    <div id="links">
      <a id="upgrade-link" href="#" class="hidden">Upgrade to Pro</a>
      <a id="account-link" href="#">Account</a>
    </div>

    <p class="hint">Or select text on any page → right-click → Decode this error</p>
  </div>

  <script src="index.ts" type="module"></script>
</body>
</html>
