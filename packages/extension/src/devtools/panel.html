<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ErrorDecoder</title>
  <style>
    :root {
      --bg: #1e1e1e;
      --bg-secondary: #252526;
      --bg-hover: #2a2d2e;
      --text: #cccccc;
      --text-muted: #808080;
      --accent: #569cd6;
      --accent-hover: #6cb0f0;
      --border: #3e3e3e;
      --error-red: #f48771;
      --warning-yellow: #cca700;
      --code-bg: #1a1a1a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 12px;
      line-height: 1.4;
      color: var(--text);
      background: var(--bg);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .toolbar button {
      padding: 4px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 11px;
      cursor: pointer;
    }

    .toolbar button:hover { border-color: var(--accent); }
    .toolbar button.primary { background: var(--accent); color: white; border-color: var(--accent); }
    .toolbar button.primary:hover { background: var(--accent-hover); }

    .toolbar .spacer { flex: 1; }
    .toolbar .status { font-size: 11px; color: var(--text-muted); }

    /* Split layout */
    .split {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Error list (left) */
    .error-list {
      width: 50%;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      flex-shrink: 0;
    }

    .error-item {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .error-item:hover { background: var(--bg-hover); }
    .error-item.selected { background: var(--bg-hover); border-left: 2px solid var(--accent); }

    .error-icon {
      flex-shrink: 0;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: bold;
      color: white;
      margin-top: 2px;
    }

    .error-icon.error { background: var(--error-red); }
    .error-icon.warning { background: var(--warning-yellow); color: #1e1e1e; }

    .error-text {
      flex: 1;
      font-family: "Fira Code", Consolas, monospace;
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .error-decode-btn {
      flex-shrink: 0;
      padding: 2px 8px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 3px;
      font-size: 10px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.1s;
    }

    .error-item:hover .error-decode-btn { opacity: 1; }

    .empty-list {
      padding: 20px;
      text-align: center;
      color: var(--text-muted);
    }

    /* Result panel (right) */
    .result-panel {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .result-panel h3 {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
      margin-top: 12px;
    }

    .result-panel h3:first-child { margin-top: 0; }

    .result-panel p { margin-bottom: 8px; }

    .result-panel ul, .result-panel ol {
      padding-left: 18px;
      margin-bottom: 8px;
    }

    .result-panel li { margin-bottom: 2px; }

    .result-panel .code-block {
      position: relative;
      background: var(--code-bg);
      border-radius: 4px;
      padding: 8px;
      margin: 4px 0 8px;
      overflow-x: auto;
    }

    .result-panel pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .result-panel code {
      font-family: "Fira Code", Consolas, monospace;
      font-size: 11px;
    }

    .copy-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 10px;
      cursor: pointer;
    }

    .copy-btn:hover { color: var(--text); }

    .result-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      text-align: center;
      padding: 20px;
    }

    /* Loading */
    .skeleton { background: var(--bg-secondary); border-radius: 3px; height: 12px; margin-bottom: 6px; animation: pulse 1.5s infinite; }
    .skeleton.short { width: 60%; }
    @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.8; } }

    /* Paste area */
    .paste-area {
      padding: 10px;
      border-bottom: 1px solid var(--border);
      display: none;
    }

    .paste-area.visible { display: block; }

    .paste-area textarea {
      width: 100%;
      padding: 8px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: "Fira Code", Consolas, monospace;
      font-size: 11px;
      resize: vertical;
      rows: 4;
    }

    .paste-area textarea:focus { outline: none; border-color: var(--accent); }
  </style>
</head>
<body>
  <!-- Toolbar -->
  <div class="toolbar">
    <button id="paste-toggle">Paste Error</button>
    <button id="clear-btn">Clear</button>
    <div class="spacer"></div>
    <span class="status" id="status-text">Ready</span>
  </div>

  <!-- Paste area (toggled) -->
  <div class="paste-area" id="paste-area">
    <textarea id="paste-input" rows="4" placeholder="Paste an error message or stack trace..."></textarea>
    <button id="paste-decode" class="primary" style="margin-top: 6px; padding: 4px 12px; background: var(--accent); color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 11px;">Decode</button>
  </div>

  <!-- Split view -->
  <div class="split">
    <!-- Error list -->
    <div class="error-list" id="error-list">
      <div class="empty-list" id="empty-msg">
        Listening for errors... Trigger an error on the page and it will appear here.
      </div>
    </div>

    <!-- Result panel -->
    <div class="result-panel" id="result-panel">
      <div class="result-placeholder" id="result-placeholder">
        Select an error or click "Decode" to see the explanation here.
      </div>
      <div id="result-content" style="display: none;"></div>
      <div id="result-loading" style="display: none;">
        <div class="skeleton"></div>
        <div class="skeleton short"></div>
        <div class="skeleton"></div>
        <div class="skeleton short"></div>
      </div>
    </div>
  </div>

  <script src="panel.js"></script>
</body>
</html>
